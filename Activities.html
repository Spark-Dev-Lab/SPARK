<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkLab</title>

    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shared header include -->
    <div id="header"></div>

    <!-- Page content -->
    <div class="content">
        <h1>Page Title</h1>
        <p>
            <!-- Put content here :) -->
        </p>
    </div>

    <!-- Include loader -->
    <script>
        fetch("header.html")
            .then(response => response.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            });
    </script>

</body>
</html>
