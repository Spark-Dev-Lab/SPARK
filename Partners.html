<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkLab</title>

    <link rel="icon" type="image/png" href="assets/header/favicon.png">
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shared header include -->
    <div id="header"></div>

    <!-- Page content -->
    <div class="content">
        <h1>Oberlin Kids</h1>
<img src="assets/Oberlinkidslogo.svg" alt="Oberlinkids Logo" style="width: 800px; height: auto;">  
        <p>
            <!-- Put content here :) -->
            Meow meow meow
        </p>
    </div>

    <!-- Include loader -->
    <script>
        fetch("header.html")
            .then(response => response.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            });
    </script>

</body>
</html>
