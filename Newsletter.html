<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARKLab</title>

    <link rel="icon" type="image/png" href="assets/header/favicon.png">
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shared header include -->
    <div id="header"></div>

    <!-- Page content -->
    <div class="content">
        <h1>Newsletter</h1>

        <p>

            <img src="assets/participate/Underconstruction.svg" class="center-image">
            <!-- Put content here :) -->
        </p>
    </div>

    <!-- Include loader -->
    <script>
        fetch("header.html")
            .then(response => response.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            });
    </script>
     <div class="gtranslate_wrapper"></div>
    <script>
    window.gtranslateSettings = {
        default_language: "en",
        alt_flags: {"en":"usa"},
        wrapper_selector: ".gtranslate_wrapper",
        flag_style: "3d",
    };
    </script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>


</body>
</html>
