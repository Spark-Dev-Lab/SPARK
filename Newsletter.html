<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARKLab</title>

    <link rel="icon" type="image/png" href="assets/header/favicon.png">
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shared header include -->
    <div id="header"></div>

    <!-- Page content -->
    <div class="content">
        <h1>Newsletter</h1>

        <p>

            <img src="assets/participate/Underconstruction.svg" class="center-image">
            <!-- Put content here :) -->
        </p>
    </div>

    <!-- Include loader -->
    <script>
        fetch("header.html")
            .then(response => response.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            });
    </script>
   
    <!-- Footer include -->
        <div id="footer"></div>
        <script>
            fetch("footer.html")
                .then(response => response.text())
                .then(html => {
                    document.getElementById("footer").innerHTML = html;
                });
        </script>

</body>



</html>
