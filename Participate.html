<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkLab</title>

    <link rel="icon" type="image/png" href="assets/header/favicon.png">
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shared header include -->
    <div id="header"></div>

    <!-- Page content -->
    <div class="content">
        <h1>Participate</h1>

        <p>
            <!-- Put content here :) -->
             <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdDPmabE2G900m9-gW2dWVgA0Tcn28fHPKxtYD7ei-yWLxf0Q/viewform?embedded=true" width="640" height="495" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
        </p>
    </div>

    <!-- Include loader -->
    <script>
        fetch("header.html")
            .then(response => response.text())
            .then(html => {
                document.getElementById("header").innerHTML = html;
            });
    </script>

</body>
</html>
